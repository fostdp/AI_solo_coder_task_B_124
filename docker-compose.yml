services:
  # ================================================================
  # 1. 时序数据库: TimescaleDB
  # ================================================================
  timescaledb:
    image: timescale/timescaledb:2.14.2-pg16
    container_name: lingqu-timescaledb
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lingqu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lingqu2026!}
      TIMESCALEDB_TELEMETRY: 'off'
      PGDATA: /var/lib/postgresql/data/pgdata
      # 性能调优
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./deployment/timescaledb/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./deployment/timescaledb/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lingqu"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M

  # ================================================================
  # 2. Postgres Exporter (Prometheus抓取数据库指标)
  # ================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: lingqu-pg-exporter
    restart: unless-stopped
    networks:
      - lingqu-net
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:${DB_PASSWORD:-lingqu2026!}@timescaledb:5432/lingqu?sslmode=disable"
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "9187:9187"

  # ================================================================
  # 3. MQTT Broker: EMQX (开源版)
  # ================================================================
  emqx:
    image: emqx/emqx:5.6.1
    container_name: lingqu-emqx
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "1883:1883"       # MQTT
      - "8083:8083"       # MQTT/WebSocket
      - "8883:8883"       # MQTT/SSL
      - "18083:18083"     # Dashboard / Prometheus接口
    environment:
      EMQX_NAME: lingqu-emqx
      EMQX_HOST: 127.0.0.1
      # 打开Prometheus指标
      EMQX_PROMETHEUS__PUSH_GATEWAY__SERVER: "http://prometheus:9091"
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: ${EMQX_PASSWORD:-admin123!}
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  # ================================================================
  # 4. Go 后端服务 (带pprof + Prometheus)
  # ================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: lingqu-backend
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "8080:8080"       # API
      - "6060:6060"       # pprof + Prometheus metrics
    environment:
      # ======== 基础配置 ========
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "8080"
      GIN_MODE: release
      CONFIG_DIR: /app/config

      # ======== 数据库 ========
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-lingqu2026!}
      DB_NAME: lingqu
      DB_SSLMODE: disable

      # ======== MQTT ========
      MQTT_BROKER: tcp://emqx:1883
      MQTT_CLIENT_ID: dou_gate_scheduler_${HOSTNAME:-docker}
      MQTT_USERNAME: ""
      MQTT_PASSWORD: ""
      MQTT_TOPIC_ALERT: lingqu/alerts

      # ======== 水力/GA ========
      GRAVITY: "9.81"
      WATER_DENSITY: "1000.0"
      GA_POPULATION_SIZE: "150"
      GA_MAX_GENERATIONS: "300"
      GA_MUTATION_RATE: "0.1"
      GA_CROSSOVER_RATE: "0.85"
    volumes:
      - ./backend/config:/app/config:ro
    depends_on:
      timescaledb:
        condition: service_healthy
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/gates"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  # ================================================================
  # 5. 前端 (Nginx + Gzip静态资源)
  # ================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lingqu-frontend
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./deployment/nginx-gzip.conf:/etc/nginx/conf.d/gzip.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1'

  # ================================================================
  # 6. 陡门传感器模拟器 (36座陡门 + 水位曲线)
  # ================================================================
  sensor-simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: lingqu-sensor-sim
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "9090:9090"       # HTTP管理 + 指标
    environment:
      SIM_GATE_COUNT: ${SIM_GATE_COUNT:-36}
      SIM_INTERVAL_MS: ${SIM_INTERVAL_MS:-1000}
      SIM_MQTT_BROKER: tcp://emqx:1883
      SIM_MQTT_TOPIC: lingqu/sensors
      SIM_HTTP_ENDPOINT: http://backend:8080/api/sensors
      SIM_WATER_LEVEL_NOISE: "0.1"
      SIM_FAULT_RATE: "0.001"
      SIM_SHIP_GENERATION_RATE: "0.05"
    depends_on:
      emqx:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./deployment/sensor-simulator/config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/health"]
      interval: 15s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  # ================================================================
  # 7. Prometheus 指标采集
  # ================================================================
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: lingqu-prometheus
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "9091:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=20GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 3s
      retries: 3

  # ================================================================
  # 8. Grafana 可视化仪表盘 (可选启用)
  # ================================================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: lingqu-grafana
    restart: unless-stopped
    networks:
      - lingqu-net
    ports:
      - "3000:3000"
    profiles:
      - monitoring
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-lingqu2026!}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - timescaledb

# ================================================================
# 顶层网络定义
# ================================================================
networks:
  lingqu-net:
    driver: bridge
    name: lingqu-net
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  timescaledb-data:
    name: lingqu-timescaledb-data
  emqx-data:
    name: lingqu-emqx-data
  emqx-log:
    name: lingqu-emqx-log
  prometheus-data:
    name: lingqu-prometheus-data
  grafana-data:
    name: lingqu-grafana-data

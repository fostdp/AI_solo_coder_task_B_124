# Gzip压缩模块 - 由nginx.conf http{}段include (compose中处理)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_buffers 16 8k;
gzip_http_version 1.1;

gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/xml+rss
    application/vnd.ms-fontobject
    application/font-woff
    application/font-woff2
    application/octet-stream
    application/wasm
    image/svg+xml
    image/x-icon
    font/opentype
    font/ttf
    font/woff2;

# Brotli (如安装了ngx_brotli可启用)
# brotli on;
# brotli_comp_level 6;
# brotli_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

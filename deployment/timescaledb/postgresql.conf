# ============================================
# PostgreSQL / TimescaleDB 调优配置
# 适合: 2核/2GB~4GB 的虚拟机
# ============================================

# ---- 连接 ----
max_connections = 200
superuser_reserved_connections = 3

# ---- 内存（根据机器调整）----
shared_buffers = 256MB                    # 总内存 1/4
effective_cache_size = 768MB              # 总内存 3/4
work_mem = 4MB                            # per-sort
maintenance_work_mem = 128MB
huge_pages = try

# ---- WAL / 写入 ----
wal_level = replica
fsync = on
synchronous_commit = on
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB
wal_keep_size = 1GB

# ---- 查询优化 ----
random_page_cost = 1.1
effective_io_concurrency = 200            # SSD
cpu_tuple_cost = 0.003
cpu_index_tuple_cost = 0.005
from_collapse_limit = 16
join_collapse_limit = 16

# ---- 时序 / TimescaleDB 特定 ----
timescaledb.max_background_workers = 8
timescaledb.max_open_chunks_per_query = 1000

# ---- 日志 ----
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 500           # 慢SQL: >500ms
log_line_prefix = '%m [%p] [%c] %quser=%u,db=%d,app=%a '
log_checkpoints = on
log_autovacuum_min_duration = 0
log_lock_waits = on
log_temp_files = 0

# ---- 自动清理 ----
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 1000
autovacuum_analyze_threshold = 500
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# ---- 并行 ----
max_worker_processes = 8
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2
